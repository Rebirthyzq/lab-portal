<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实验室预算&固资导航平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 顶部导航栏 */
    .navbar {
      background: #fff;
      box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      font-size: 40px;
      line-height: 1;
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1f2937;
      margin: 0;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 12px;
      color: #6b7280;
      margin: 4px 0 0 0;
      line-height: 1;
    }

    /* 主内容区 */
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* 分类筛选 */
    .filter-section {
      margin-bottom: 32px;
      text-align: center;
    }

    .category-buttons {
      display: inline-flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .category-btn {
      padding: 10px 24px;
      border: 1px solid #dcdfe6;
      background: #fff;
      color: #606266;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .category-btn:hover {
      color: #409eff;
      border-color: #409eff;
    }

    .category-btn.active {
      background: #409eff;
      color: #fff;
      border-color: #409eff;
    }

    /* 卡片网格 */
    .cards-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .system-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
    }

    .system-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px 0 rgba(0, 0, 0, 0.12);
      border-color: #409eff;
    }

    .card-header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      font-size: 32px;
      color: #fff;
    }

    .system-card:hover .card-icon {
      transform: scale(1.1) rotate(5deg);
    }

    .card-body {
      flex: 1;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
      margin: 0 0 12px 0;
      line-height: 1.4;
      text-align: center;
    }

    .card-description {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin: 0;
      text-align: center;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
    }

    .visit-btn {
      background: none;
      border: none;
      color: #409eff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .visit-btn:hover {
      color: #66b1ff;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 32px 24px;
      color: #6b7280;
      font-size: 14px;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #909399;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .navbar-content {
        height: 60px;
        padding: 0 16px;
      }

      .logo-text h1 {
        font-size: 16px;
      }

      .logo-text p {
        display: none;
      }

      .main-content {
        padding: 20px 16px;
      }

      .cards-container {
        grid-template-columns: 1fr;
      }

      .system-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <div class="navbar-content">
      <div class="logo-section">
        <div class="logo-icon">🧪</div>
        <div class="logo-text">
          <h1>实验室预算&固资导航平台</h1>
          <p>Budget & Asset Management Portal</p>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 分类筛选 -->
    <div class="filter-section">
      <div class="category-buttons" id="categoryButtons">
        <!-- 动态生成分类按钮 -->
      </div>
    </div>

    <!-- 卡片网格 -->
    <div class="cards-container" id="cardsContainer">
      <!-- 动态生成卡片 -->
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">📭</div>
      <p>没有找到相关系统</p>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <p>© 2024 实验室预算&固资导航平台 | 便捷管理，高效运作</p>
  </footer>

  <script>
    // 系统链接数据（从后端API获取）
    let systemLinks = [];

    let currentCategory = '';

    // 获取所有分类
    function getCategories() {
      const categories = [...new Set(systemLinks.map(link => link.category))];
      return categories.filter(c => c);
    }

    // 渲染分类按钮
    function renderCategoryButtons() {
      const container = document.getElementById('categoryButtons');
      const categories = getCategories();

      let html = '<button class="category-btn active" onclick="filterByCategory(\'\')">全部系统</button>';
      categories.forEach(cat => {
        html += `<button class="category-btn" onclick="filterByCategory('${cat}')">${cat}</button>`;
      });

      container.innerHTML = html;
    }

    // 渲染卡片
    function renderCards(links) {
      const container = document.getElementById('cardsContainer');
      const emptyState = document.getElementById('emptyState');

      if (links.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      container.style.display = 'grid';
      emptyState.style.display = 'none';

      const html = links.map(link => `
        <div class="system-card" onclick="openLink('${link.url}')">
          <div class="card-header">
            <div class="card-icon" style="background: ${link.color}">
              ${link.icon}
            </div>
          </div>
          <div class="card-body">
            <h3 class="card-title">${link.title}</h3>
            <p class="card-description">${link.description}</p>
          </div>
          <div class="card-footer">
            <button class="visit-btn">
              访问链接 →
            </button>
          </div>
        </div>
      `).join('');

      container.innerHTML = html;
    }

    // 按分类筛选
    function filterByCategory(category) {
      currentCategory = category;

      // 更新按钮状态
      const buttons = document.querySelectorAll('.category-btn');
      buttons.forEach(btn => {
        btn.classList.remove('active');
        if ((category === '' && btn.textContent === '全部系统') ||
            btn.textContent === category) {
          btn.classList.add('active');
        }
      });

      // 筛选并渲染
      const filtered = category === ''
        ? systemLinks
        : systemLinks.filter(link => link.category === category);

      renderCards(filtered);
    }

    // 打开链接
    function openLink(url) {
      window.open(url, '_blank');
    }

    // 从后端API加载数据
    async function loadLinksFromAPI() {
      try {
        const response = await fetch('http://localhost:5000/api/links');
        const result = await response.json();

        if (result.code === 200) {
          systemLinks = result.data;
          renderCategoryButtons();
          renderCards(systemLinks);
        } else {
          console.error('加载数据失败:', result);
          showError('加载数据失败，请检查后端服务是否运行');
        }
      } catch (error) {
        console.error('请求失败:', error);
        showError('无法连接到后端服务，请确保后端服务运行在 http://localhost:5000');
      }
    }

    // 显示错误信息
    function showError(message) {
      const container = document.getElementById('cardsContainer');
      const emptyState = document.getElementById('emptyState');
      container.style.display = 'none';
      emptyState.style.display = 'block';
      emptyState.innerHTML = `
        <div class="empty-state-icon">⚠️</div>
        <p>${message}</p>
      `;
    }

    // 初始化
    function init() {
      loadLinksFromAPI();
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
